services:
  postgres:
    image: postgres:16-alpine
    container_name: cornerlab-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cornerlab
      POSTGRES_PASSWORD: cornerlab
      POSTGRES_DB: cornerlab
    ports:
      - "5432:5432"
    volumes:
      - cornerlab_pgdata:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cornerlab -d cornerlab"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: cornerlab-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    container_name: cornerlab-backend
    restart: unless-stopped
    environment:
      PORT: 8080
      DATABASE_URL: postgres://cornerlab:cornerlab@postgres:5432/cornerlab?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      JWT_SECRET: change-me-in-production
      ENVIRONMENT: production
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      SPORTS_DATA_PROVIDER: ${SPORTS_DATA_PROVIDER:-fallback}
      API_FOOTBALL_KEY: ${API_FOOTBALL_KEY:-}
      SPORTMONKS_KEY: ${SPORTMONKS_KEY:-}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
    container_name: cornerlab-frontend
    restart: unless-stopped
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  cornerlab_pgdata:
