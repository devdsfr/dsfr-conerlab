server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Encaminha chamadas de API para o serviço backend (Docker Compose).
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Angular usa roteamento client-side; qualquer rota desconhecida cai no index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
